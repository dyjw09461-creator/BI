{% extends "base.html" %}
{% block content %}
<main class="form-page">
  <form method="post" class="mall-form">
    <h1>会员注册</h1>
    <label>登录名<input name="login_name" required></label>
    <label>真实姓名<input name="real_name" required></label>
    <label>密码<input name="password" type="password" required></label>
    <label>手机号<input name="phone" required></label>
    <label>邮箱<input name="email"></label>
    <button>免费注册</button>
  </form>
</main>
{% endblock %}
